<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else 'Task Manager' }}</title>
    <!-- Use Tailwind CSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

    <nav class="bg-blue-600 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-xl font-bold font-sans">Task Manager</a>
            <div>
                <a href="{{ url_for('new_task') }}" class="mx-2 hover:underline">New Task</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 mt-8">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="px-4 py-3 mb-6 text-sm rounded-lg shadow 
                        {% if category == 'success' %}bg-green-100 border border-green-200 text-green-700
                        {% elif category == 'danger' %}bg-red-100 border border-red-200 text-red-700
                        {% else %}bg-blue-100 border border-blue-200 text-blue-700{% endif %}" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

</body>
</html>
